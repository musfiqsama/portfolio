<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banglar Shaad</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0C3824;
    color: white;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
}

button {
    background: gold;
    border: none;
    padding: 10px 15px;
    border-radius: 10px;
    font-weight: bold;
}

.container {
    padding: 15px;
}

.card {
    background: white;
    color: black;
    border-radius: 15px;
    margin-bottom: 20px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.price {
    font-weight: bold;
    color: green;
}

.order-btn {
    display: block;
    margin-top: 10px;
    background: green;
    color: white;
    padding: 10px;
    text-align: center;
    border-radius: 10px;
    text-decoration: none;
}
</style>
</head>

<body>

<header>
    <h2>Banglar Shaad</h2>
    <button onclick="order()">Order Now</button>
</header>

<div class="container">

    <h3>Menu</h3>

    <!-- Tandoori -->
    <div class="card">
        <img src="tandoori.jpg">
        <div class="card-content">
            <h3>Tandoori Chicken</h3>
            <p class="price">1 Person – 80 DKK</p>
            <a class="order-btn" href="https://wa.me/4571442779">Order Now</a>
        </div>
    </div>

    <!-- Chicken Biryani -->
    <div class="card">
        <img src="chicken.jpg">
        <div class="card-content">
            <h3>Chicken Biryani</h3>
            <p class="price">1 Person – 80 DKK</p>
            <a class="order-btn" href="https://wa.me/4571442779">Order Now</a>
        </div>
    </div>

    <!-- Beef -->
    <div class="card">
        <img src="beef.jpg">
        <div class="card-content">
            <h3>Beef Biryani</h3>
            <p class="price">1 Person – 95 DKK</p>
            <a class="order-btn" href="https://wa.me/4571442779">Order Now</a>
        </div>
    </div>

    <!-- Khichuri -->
    <div class="card">
        <img src="khichuri.jpg">
        <div class="card-content">
            <h3>Chicken Khichuri</h3>
            <p class="price">1 Person – 70 DKK</p>
            <a class="order-btn" href="https://wa.me/4571442779">Order Now</a>
        </div>
    </div>

</div>

<script>
function order(){
    window.location.href="https://wa.me/4571442779";
}
</script>

</body>
</html>
